prompt.prompt = "کدام عبارت بهتر توضیح می‌دهد اگر یک متغیر `x` «غیرقابل‌تغییر» (immutable) باشد یعنی چه؟"
answer.answer = "`x` بعد از اینکه مقداردهی شد دیگر نمی‌تواند تغییر کند."
