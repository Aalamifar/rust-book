  "نمی‌توانید یک ارجاع (reference) به `x` ایجاد کنید."
]
context = """
Immutable یعنی «غیرقابل‌تغییر» (not mutable) یا غیرقابل تغییر.
"""

[[questions]]
id = "dcf53c67-b3c9-4c54-8da0-90749cc669e8"
type = "ShortAnswer"
prompt.prompt = "برای اینکه نشان دهیم یک متغیر قابل تغییر (mutate) است، بعد از `let` از چه کلمهٔ کلیدی استفاده می‌شود؟"
answer.answer = "mut"
context = """
مثلاً می‌توانید یک متغیر قابل تغییر `x` را با نوشتن این کد بسازید: `let mut x = 1`.
"""

